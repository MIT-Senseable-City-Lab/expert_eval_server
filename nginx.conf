# /data/vision/beery/scratch/julia/.config/nginx/nginx.conf

worker_processes 1;

# Use ABSOLUTE paths (nginx won't expand ~)
error_log  /data/vision/beery/scratch/julia/.config/nginx/error.log;
pid        /data/vision/beery/scratch/julia/.config/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Inline a minimal types block so we don't depend on /etc/nginx/mime.types
    types {
        text/html   html htm shtml;
        text/css    css;
        text/xml    xml;
        image/gif   gif;
        image/jpeg  jpeg jpg;
        image/png   png;
        image/svg+xml svg;
        application/javascript js;
        application/json json map topojson;
        font/woff   woff;
        font/woff2  woff2;
    }
    default_type application/octet-stream;

    access_log /data/vision/beery/scratch/julia/.config/nginx/access.log;

    upstream app {
        server 127.0.0.1:5001;   # make sure gunicorn binds here
    }

    server {
        listen 8080;
        server_name _;

        # (optional but nice) user-space temp dirs so nginx doesn't try /var
        client_body_temp_path /data/vision/beery/scratch/julia/.config/nginx/temp/client_temp;
        proxy_temp_path       /data/vision/beery/scratch/julia/.config/nginx/temp/proxy_temp;

        # Serve static files directly
        location /static/ {
            alias /data/vision/beery/fgg_ai/finegrained_metric_intern/server/ss200k_annotations/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Proxy everything else to gunicorn
        location / {
            proxy_pass http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            client_max_body_size 10M;
        }
    }
}
