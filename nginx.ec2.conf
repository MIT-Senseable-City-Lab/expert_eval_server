# Nginx config for bumblebee eval server (EC2 / Linux)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /home/ubuntu/eval_server/logs/nginx_access.log;
    error_log  /home/ubuntu/eval_server/logs/nginx_error.log;

    upstream app {
        server 127.0.0.1:5050;
    }

    server {
        listen 80;
        server_name _;

        # Serve static files directly (images, CSS, JS)
        location /static/ {
            alias /home/ubuntu/eval_server/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Proxy everything else to Gunicorn
        location / {
            proxy_pass http://app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            client_max_body_size 10M;
        }
    }
}
